name: Deploy to AWS EC2
description: Deploys the application to AWS EC2 instances
author: akhilsmokie3-ops

inputs:
  aws-access-key-id:
    required: true
    description: AWS Access Key ID
  aws-secret-access-key:
    required: true
    description: AWS Secret Access Key
  ec2-instance-id:
    required: true
    description: EC2 Instance ID to deploy to
  region:
    required: false
    default: us-east-1
    description: AWS Region (default us-east-1)
  deployment-script:
    required: true
    description: Path to the deployment script

outputs:
  deployment-status:
    description: Status of the deployment
  instance-ip:
    description: IP Address of the EC2 instance

runs:
  using: composite
  steps:
    - run: echo "Starting deployment to EC2 instance ${{ inputs.ec2-instance-id }}"
      shell: bash
    - run: echo "Region: ${{ inputs.region }}"
      shell: bash
    - run: echo "Deployment complete"
      shell: bash
